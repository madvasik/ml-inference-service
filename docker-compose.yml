services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ml_inference_service
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    # Порт не публикуем: доступ только из сети compose (избегает конфликта с локальным Redis на :6379)

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ml_inference_service
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-jwt-secret-change-in-prod}
      MOCK_TOPUP_SECRET: ${MOCK_TOPUP_SECRET:-dev-mock-topup-secret}
      MODELS_STORAGE_DIR: /data/models
      PREDICTION_COST_CREDITS: ${PREDICTION_COST_CREDITS:-1}
    volumes:
      - models:/data/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ml_inference_service
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      MODELS_STORAGE_DIR: /data/models
      PREDICTION_COST_CREDITS: ${PREDICTION_COST_CREDITS:-1}
    volumes:
      - models:/data/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    ports:
      - "8502:8501"
    environment:
      API_URL: http://api:8000/api
      MOCK_TOPUP_SECRET: ${MOCK_TOPUP_SECRET:-dev-mock-topup-secret}
    depends_on:
      - api

  prometheus:
    image: prom/prometheus:v2.55.1
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "19090:9090"
    depends_on:
      - api

  grafana:
    image: grafana/grafana:11.3.0
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_DEFAULT_THEME: dark
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus

volumes:
  pgdata:
  models:
