x-app-env: &app-env
  DATABASE_URL: postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-ml_service}
  SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
  ALGORITHM: ${ALGORITHM:-HS256}
  ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
  REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
  PREDICTION_COST: ${PREDICTION_COST:-10}
  DEBUG: ${DEBUG:-True}
  API_V1_PREFIX: ${API_V1_PREFIX:-/api/v1}
  ML_MODELS_DIR: var/ml_models
  CELERY_BROKER_URL: redis://redis:6379/0
  CELERY_RESULT_BACKEND: redis://redis:6379/0
  RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-1000}
  RATE_LIMIT_PER_USER_PER_MINUTE: ${RATE_LIMIT_PER_USER_PER_MINUTE:-100}
  CORS_ORIGINS: ${CORS_ORIGINS:-*}
  MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-100}
  LOG_JSON_FORMAT: ${LOG_JSON_FORMAT:-False}
  INITIAL_ADMIN_EMAIL: ${INITIAL_ADMIN_EMAIL:-admin@mlservice.com}
  INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD:-admin123}
  INITIAL_ADMIN_CREDITS: ${INITIAL_ADMIN_CREDITS:-10000}

services:
  postgres:
    image: postgres:15-alpine
    container_name: ml_service_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-ml_service}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-ml_service}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ml_service_network

  redis:
    image: redis:7-alpine
    container_name: ml_service_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ml_service_network

  backend:
    build:
      context: .
      dockerfile: infra/docker/backend/Dockerfile
    container_name: ml_service_backend
    env_file:
      - .env
    environment:
      <<: *app-env
    ports:
      - "8000:8000"
    volumes:
      - ./var/ml_models:/app/var/ml_models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "
        alembic -c backend/alembic.ini upgrade head &&
        uvicorn backend.app.main:app --host 0.0.0.0 --port 8000
      "
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - ml_service_network

  celery:
    build:
      context: .
      dockerfile: infra/docker/celery/Dockerfile
    container_name: ml_service_celery
    env_file:
      - .env
    environment:
      <<: *app-env
      ENABLE_METRICS_SERVER: "true"
      METRICS_PORT: "9091"
      PROMETHEUS_MULTIPROC_DIR: "/tmp/prometheus_multiproc_dir"
    ports:
      - "9091:9091"
    volumes:
      - ./var/ml_models:/app/var/ml_models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - ml_service_network

  celery-beat:
    build:
      context: .
      dockerfile: infra/docker/celery/Dockerfile
    container_name: ml_service_celery_beat
    env_file:
      - .env
    environment:
      <<: *app-env
    command: celery -A backend.app.worker:celery_app beat --loglevel=info
    volumes:
      - ./var/ml_models:/app/var/ml_models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - ml_service_network

  prometheus:
    image: prom/prometheus:latest
    container_name: ml_service_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - ml_service_network

  grafana:
    image: grafana/grafana:latest
    container_name: ml_service_grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./infra/monitoring/grafana/dashboards:/etc/grafana/dashboards
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - ml_service_network

  streamlit:
    build:
      context: .
      dockerfile: infra/docker/streamlit/Dockerfile
    container_name: ml_service_streamlit
    environment:
      BASE_URL: http://backend:8000
      INITIAL_ADMIN_EMAIL: ${INITIAL_ADMIN_EMAIL:-admin@mlservice.com}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD:-admin123}
    ports:
      - "8501:8501"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ml_service_network

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:

networks:
  ml_service_network:
    driver: bridge
