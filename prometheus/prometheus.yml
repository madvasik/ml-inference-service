global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'ml-inference-service'

scrape_configs:
  - job_name: 'ml-inference-service-backend'
    static_configs:
      - targets: ['backend:8000']
    metrics_path: '/metrics'
    scrape_interval: 15s
    
  - job_name: 'ml-inference-service-celery'
    static_configs:
      - targets: ['celery:9091']
    metrics_path: '/metrics'
    scrape_interval: 15s
