[pytest]
testpaths =
    tests/unit
    tests/integration
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --cov=backend/app
    --cov-report=term-missing
    --cov-fail-under=70
    --strict-markers
markers =
    unit: Unit tests
    integration: Integration tests
    e2e: Live stack end-to-end tests
    slow: Slow running tests
filterwarnings =
    ignore::ResourceWarning:asyncio
